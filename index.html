<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1A7C4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="קניות בית">
<title>קניות בית 🛒</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --g1:#1A7C4A; --g2:#2AA65F; --g3:#52C97A; --mint:#E6F7EE;
  --red:#EF4444; --reds:#FEF2F2; --ora:#F97316; --oras:#FFF7ED;
  --bg:#F7F8FA; --card:#fff; --txt:#18181B; --txt2:#52525B; --muted:#A1A1AA;
  --bdr:#E4E4E7; --div:#F4F4F5;
  --sh:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.05);
  --sh2:0 8px 32px rgba(0,0,0,.12);
  --r:18px; --r2:12px; --r3:8px;
  --hdr:58px; --nav:72px;
  --st:env(safe-area-inset-top,0px); --sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:-webkit-fill-available}
body{font-family:'Rubik',Arial,sans-serif;background:var(--bg);color:var(--txt);direction:rtl;
  min-height:100vh;min-height:-webkit-fill-available;-webkit-font-smoothing:antialiased;font-size:15px;
  overscroll-behavior:none}
button{cursor:pointer;border:none;background:none;font-family:inherit;touch-action:manipulation}
input,select,textarea{font-family:inherit}

/* ── LAYOUT ── */
.hdr{position:fixed;top:0;top:var(--st);left:50%;transform:translateX(-50%);
  width:100%;max-width:600px;height:var(--hdr);background:var(--g1);color:#fff;
  display:flex;align-items:center;justify-content:space-between;padding:0 18px;
  z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.hdr-title{font-size:19px;font-weight:800;display:flex;align-items:center;gap:8px;letter-spacing:-.3px}
.hdr-right{display:flex;gap:4px}
.hdr-btn{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:20px;color:#fff;transition:background .15s}
.hdr-btn:active{background:rgba(255,255,255,.2)}

#alert-bar{position:fixed;top:calc(var(--hdr) + var(--st));left:50%;transform:translateX(-50%);
  width:100%;max-width:600px;background:var(--red);color:#fff;padding:10px 18px;
  font-size:13px;font-weight:700;z-index:190;text-align:center;display:none;
  box-shadow:0 2px 8px rgba(239,68,68,.35)}

#main{max-width:600px;margin:0 auto;
  padding-top:calc(var(--hdr) + var(--st) + 16px);
  padding-bottom:calc(var(--nav) + var(--sb) + 24px);
  padding-left:16px;padding-right:16px}
#main.has-alert{padding-top:calc(var(--hdr) + var(--st) + 46px + 16px)}

.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:600px;height:calc(var(--nav) + var(--sb));
  padding-bottom:var(--sb);background:#fff;display:flex;
  border-top:1px solid var(--bdr);z-index:200;box-shadow:0 -2px 16px rgba(0,0,0,.06)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;color:var(--muted);transition:color .15s;position:relative;user-select:none}
.nav-btn.on{color:var(--g1)}
.nav-btn.on::before{content:'';position:absolute;top:0;width:28px;height:3px;
  background:var(--g1);border-radius:0 0 3px 3px}
.nav-icon{font-size:22px;line-height:1}
.nav-lbl{font-size:10px;font-weight:700;letter-spacing:.2px}
.nav-badge{position:absolute;top:5px;left:50%;margin-left:4px;min-width:17px;height:17px;
  background:var(--red);color:#fff;border-radius:9px;font-size:10px;font-weight:800;
  display:none;align-items:center;justify-content:center;padding:0 4px}

.fab{position:fixed;left:18px;bottom:calc(var(--nav) + var(--sb) + 16px);
  width:56px;height:56px;border-radius:50%;background:var(--g1);color:#fff;
  font-size:28px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(26,124,74,.5);z-index:190;transition:all .2s;line-height:1}
.fab:active{transform:scale(.91)}

/* ── CARDS ── */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:12px}
.card-hdr{padding:14px 18px;border-bottom:1px solid var(--div);display:flex;align-items:center;justify-content:space-between}
.card-ttl{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.sec{margin-bottom:20px}
.sec-ttl{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* ── CATEGORY ICON (Bring!-style) ── */
.cat-ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;font-size:22px;flex-shrink:0}

/* ── ITEM ROWS ── */
.item-row{display:flex;align-items:center;padding:13px 16px;gap:13px;direction:ltr;
  border-bottom:1px solid var(--div);min-height:66px;transition:background .12s;background:#fff}
.item-row:last-child{border-bottom:none}
.item-row:active{background:var(--bg)}
.item-row.done{opacity:.5;background:#fff}
.i-info{flex:1;min-width:0;direction:rtl}
.i-name{font-size:15px;font-weight:600;line-height:1.3;color:var(--txt)}
.i-name.thru{text-decoration:line-through;color:var(--muted)}
.i-meta{font-size:12px;color:var(--muted);margin-top:3px}
.i-acts{display:flex;align-items:center;gap:8px;flex-shrink:0}
/* ── ITEM ACTIONS (right side) ── */
.item-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.item-qty{font-size:13px;font-weight:600;color:var(--txt2);white-space:nowrap;min-width:28px;text-align:center}
.item-menu{width:36px;height:36px;background:var(--g1);border-radius:9px;color:#fff;
  font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  letter-spacing:0;line-height:1;transition:all .14s}
.item-menu:active{transform:scale(.86);background:var(--g2)}
.item-menu.done{background:var(--mint);color:var(--g1);font-size:16px}
.item-chk{width:28px;height:28px;border:2px solid var(--bdr);border-radius:8px;flex-shrink:0;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.item-chk.on{background:var(--g1);border-color:var(--g1)}
.item-chk.on::after{content:'✓';color:#fff;font-size:15px;font-weight:700}
.item-del{width:28px;height:28px;background:var(--div);border-radius:7px;
  color:var(--muted);font-size:14px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .14s}
.item-del:active{background:var(--reds);color:var(--red)}

/* ── STATUS ── */
.pill{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;
  font-size:11px;font-weight:700;gap:3px;white-space:nowrap}
.pill.urg{background:var(--reds);color:var(--red)}
.pill.soo{background:var(--oras);color:var(--ora)}
.pill.ok{background:var(--mint);color:var(--g2)}
.pill.gray{background:var(--div);color:var(--muted)}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:var(--r2);padding:16px 10px;
  text-align:center;box-shadow:var(--sh)}
.stat-n{font-size:34px;font-weight:800;line-height:1;margin-bottom:4px}
.stat-l{font-size:11px;font-weight:600;color:var(--muted)}
.stat-card.urg .stat-n{color:var(--red)}
.stat-card.soo .stat-n{color:var(--ora)}
.stat-card.ok  .stat-n{color:var(--g2)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:12px 20px;border-radius:var(--r2);font-size:14px;font-weight:700;
  cursor:pointer;border:none;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn:active{transform:scale(.96)}
.btn.pri{background:var(--g1);color:#fff}
.btn.sec{background:var(--mint);color:var(--g1)}
.btn.dan{background:var(--reds);color:var(--red)}
.btn.out{background:transparent;border:1.5px solid var(--bdr);color:var(--txt)}
.btn.ghost{background:transparent;color:var(--g1);font-weight:700}
.btn.sm{padding:7px 14px;font-size:13px;border-radius:10px}
.btn.xs{padding:5px 10px;font-size:12px;border-radius:8px}
.btn.full{width:100%}

.chk{width:34px;height:34px;border-radius:50%;border:2px solid var(--bdr);
  display:flex;align-items:center;justify-content:center;font-size:17px;
  color:transparent;background:#fff;flex-shrink:0;transition:all .2s}
.chk.on{background:var(--g1);border-color:var(--g1);color:#fff}
.chk:active{transform:scale(.87)}

.ibtn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:18px;background:var(--div);flex-shrink:0}
.ibtn:active{background:var(--bdr)}

/* ── TOGGLE ── */
.tog{width:44px;height:26px;background:var(--bdr);border-radius:13px;position:relative;
  cursor:pointer;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--g1)}
.tog::after{content:'';position:absolute;width:20px;height:20px;background:#fff;
  border-radius:50%;top:3px;right:3px;transition:transform .2s;
  box-shadow:0 1px 4px rgba(0,0,0,.2)}
.tog.on::after{transform:translateX(-18px)}

/* ── CATEGORY FILTER CHIPS ── */
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;padding:8px 14px;
  border-radius:24px;font-size:13px;font-weight:600;background:var(--card);
  color:var(--muted);border:1.5px solid var(--bdr);cursor:pointer;transition:all .15s}
.chip.on{background:var(--g1);color:#fff;border-color:var(--g1)}
.chip:active{opacity:.7}

/* ── GROUP HEADER ── */
.grp-hdr{padding:9px 16px;font-size:11px;font-weight:800;color:var(--muted);
  text-transform:uppercase;letter-spacing:.8px;background:var(--div);
  display:flex;align-items:center;justify-content:center;gap:6px;text-align:center}

/* ── FORMS ── */
.fg{margin-bottom:14px}
.fl{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px}
.fi{width:100%;padding:13px 15px;border:1.5px solid var(--bdr);border-radius:var(--r2);
  font-size:15px;color:var(--txt);background:#fff;direction:rtl;
  -webkit-appearance:none;transition:border-color .15s}
.fi:focus{outline:none;border-color:var(--g2)}
.fi::placeholder{color:var(--muted)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fsel{width:100%;padding:13px 15px;border:1.5px solid var(--bdr);border-radius:var(--r2);
  font-size:16px;color:var(--txt);background:#fff;direction:rtl;
  -webkit-appearance:none}
.fsel:focus{outline:none;border-color:var(--g2)}
.fta{width:100%;padding:13px 15px;border:1.5px solid var(--bdr);border-radius:var(--r2);
  font-size:15px;color:var(--txt);background:#fff;direction:rtl;resize:none;min-height:100px}
.fta:focus{outline:none;border-color:var(--g2)}

/* ── MODAL / BOTTOM SHEET ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;
  display:flex;align-items:flex-end;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.sheet{background:var(--card);border-radius:var(--r) var(--r) 0 0;width:100%;
  max-height:92vh;overflow-y:auto;padding-bottom:max(20px,var(--sb));
  animation:sheetup .28s cubic-bezier(.34,1.08,.64,1);-webkit-overflow-scrolling:touch}
@keyframes sheetup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:40px;height:4px;background:var(--bdr);border-radius:2px;margin:12px auto 4px}
.sheet-hdr{padding:6px 18px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--div)}
.sheet-ttl{font-size:18px;font-weight:800}
.sheet-close{width:32px;height:32px;border-radius:50%;background:var(--div);
  font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.sheet-body{padding:20px}

/* ── SETTINGS PANEL ── */
.spanel{position:fixed;top:0;bottom:0;left:0;right:0;background:var(--bg);
  z-index:400;overflow-y:auto;padding-top:var(--st);animation:slin .25s ease}
@keyframes slin{from{transform:translateX(-100%)}to{transform:translateX(0)}}
.sp-hdr{background:var(--g1);color:#fff;height:var(--hdr);display:flex;
  align-items:center;gap:12px;padding:0 18px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.sp-body{padding:20px}
.sp-sec{margin-bottom:24px}
.sp-sec-ttl{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:10px}
.sp-card{background:var(--card);border-radius:var(--r2);box-shadow:var(--sh);overflow:hidden}
.sp-row{padding:14px 16px;border-bottom:1px solid var(--div);display:flex;
  align-items:center;justify-content:space-between;gap:12px}
.sp-row:last-child{border-bottom:none}
.sp-lbl{font-size:15px;font-weight:500}

/* ── UPLOAD ── */
.upload-area{border:2px dashed var(--bdr);border-radius:var(--r);padding:28px 20px;
  text-align:center;background:var(--card);position:relative;cursor:pointer;transition:all .2s}
.upload-area:active,.upload-area.drag{border-color:var(--g1);background:var(--mint)}
.upload-area input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer}
.fchips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.fchip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;
  background:var(--mint);color:var(--g1);border-radius:8px;font-size:12px;font-weight:700}
.fchip-x{font-size:16px;cursor:pointer;color:var(--g2)}

/* ── SPINNER ── */
.spinner{width:40px;height:40px;border:3px solid var(--mint);border-top-color:var(--g1);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:52px 20px}
.loading p{margin-top:14px;color:var(--muted);font-size:14px;line-height:1.6}

/* ── TOAST ── */
.toast{position:fixed;top:calc(var(--hdr) + var(--st) + 12px);left:50%;
  transform:translateX(-50%);background:var(--txt);color:#fff;padding:12px 22px;
  border-radius:40px;font-size:14px;font-weight:600;z-index:600;white-space:nowrap;
  box-shadow:var(--sh2);display:flex;align-items:center;gap:8px;
  max-width:calc(100vw - 32px);animation:tin .28s cubic-bezier(.34,1.2,.64,1)}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(-10px) scale(.94)}}
.toast.hide{animation:tout .2s ease forwards}
@keyframes tout{to{opacity:0;transform:translateX(-50%) translateY(-8px) scale(.9)}}
.toast.pri{background:var(--g1)} .toast.dan{background:var(--red)} .toast.wrn{background:var(--ora)}

/* ── PROGRESS BAR ── */
.prog{height:5px;background:var(--div);border-radius:3px;overflow:hidden;margin-top:7px}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}
.prog-fill.urg{background:var(--red)} .prog-fill.soo{background:var(--ora)} .prog-fill.ok{background:var(--g3)}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:56px 24px;color:var(--muted)}
.empty-ico{font-size:56px;margin-bottom:16px}
.empty-ttl{font-size:18px;font-weight:700;color:var(--txt);margin-bottom:8px}
.empty-sub{font-size:14px;line-height:1.7;max-width:280px;margin:0 auto 20px}


/* ── IMPORT AREA ── */
.import-tabs{display:flex;border-bottom:1px solid var(--div);margin-bottom:16px}
.import-tab{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:600;
  color:var(--muted);cursor:pointer;transition:all .15s;border-bottom:3px solid transparent}
.import-tab.on{color:var(--g1);border-bottom-color:var(--g1)}

/* ── DIVIDER ── */
.divlbl{display:flex;align-items:center;gap:10px;color:var(--muted);
  font-size:12px;font-weight:700;margin:14px 0 8px}
.divlbl::before,.divlbl::after{content:'';flex:1;height:1px;background:var(--bdr)}


/* ── WIZARD ── */
.wizard-ov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;
  display:flex;align-items:flex-end;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
.wizard-card{background:var(--card);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:600px;
  max-height:92vh;overflow-y:auto;margin:0 auto;padding-bottom:max(24px,var(--sb));
  animation:sheetup .35s cubic-bezier(.34,1.08,.64,1)}
.wiz-prog{display:flex;gap:6px;justify-content:center;padding:16px 20px 0}
.wiz-dot{width:8px;height:8px;border-radius:50%;background:var(--bdr);transition:all .25s}
.wiz-dot.on{background:var(--g1);width:24px;border-radius:4px}
.wiz-step{padding:4px 20px 20px}
.wiz-ico{font-size:60px;text-align:center;margin-bottom:14px;margin-top:10px}
.wiz-ttl{font-size:22px;font-weight:800;text-align:center;margin-bottom:8px}
.wiz-sub{font-size:15px;color:var(--txt2);text-align:center;line-height:1.65;margin-bottom:20px}

/* ── SETUP CARD (home) ── */
.setup-card{background:linear-gradient(135deg,#0F3D26 0%,var(--g1) 60%,var(--g2) 100%);
  color:#fff;border-radius:var(--r);padding:20px;margin-bottom:20px}
.setup-steps{margin-top:14px;display:flex;flex-direction:column;gap:9px}
.setup-step-row{display:flex;align-items:center;gap:10px;font-size:14px}
.step-dot{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}

/* ── POST-SHOPPING ── */
.post-item{display:flex;align-items:center;padding:11px 16px;gap:12px;
  border-bottom:1px solid var(--div);cursor:pointer;transition:background .1s;user-select:none}
.post-item:last-child{border-bottom:none}
.post-item:active{background:var(--bg)}
.post-item.sel{background:var(--mint)}
.post-item.sel .chk{background:var(--g1);border-color:var(--g1);color:#fff}

/* ── DESKTOP ── */
@media(min-width:620px){
  body{background:#C8DDD4}
  .hdr,.nav,#alert-bar{border-left:1px solid rgba(0,0,0,.06);border-right:1px solid rgba(0,0,0,.06)}
  .nav{border-radius:16px 16px 0 0}
  #main{box-shadow:var(--sh2);background:var(--bg);min-height:100vh}
  .fab{left:calc(50% - 284px)}
  .spanel{max-width:600px;left:50%;right:auto;transform:translateX(-50%)}
  .overlay{justify-content:center}
  .sheet{max-width:600px;border-radius:var(--r) var(--r) 0 0}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-title">🛒 קניות בית</div>
  <div class="hdr-right">
    <button class="hdr-btn" id="btn-import" title="ייבוא פריטים">📸</button>
    <button class="hdr-btn" id="btn-settings" title="הגדרות" style="position:relative">⚙️</button>
  </div>
</header>

<div id="alert-bar"></div>
<main id="main"></main>

<nav class="nav">
  <button class="nav-btn on" data-tab="shop">
    <div class="nav-icon">🛒</div><div class="nav-lbl">קניות</div>
  </button>
  <button class="nav-btn" data-tab="staples">
    <div class="nav-icon">🗄️</div><div class="nav-lbl">מאגר</div>
  </button>
</nav>

<button class="fab" id="fab">+</button>
<div id="overlay" style="display:none" class="overlay"></div>
<div id="spanel" style="display:none" class="spanel"></div>
<div id="wizard" style="display:none" class="wizard-ov">
  <div class="wizard-card">
    <div class="sheet-handle"></div>
    <div id="wizard-inner"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// CATEGORY STYLES
// ══════════════════════════════════════════

// Map avg_order_interval_days → FREQS bucket value
// Midpoints: שבועי <14d, דו-שבועי <28d, חודשי <48d, דו-חודשי ≥48d
function freqBucket(days){
  const d=Math.max(1,Math.round(days));
  if(d<14)return 7;
  if(d<28)return 21;
  if(d<48)return 35;
  return 60;
}
// Returns true if today falls within the given season (Israel climate)
function isInSeason(seasonCat){
  if(!seasonCat||seasonCat==='כל השנה')return true;
  const m=new Date().getMonth()+1; // 1-12
  if(seasonCat==='קיץ')return m>=6&&m<=8;
  if(seasonCat==='סתיו')return m>=9&&m<=11;
  if(seasonCat==='חורף')return m===12||m<=2;
  if(seasonCat==='אביב')return m>=3&&m<=5;
  return true;
}

function daysSince(d){return d?((Date.now()-new Date(d).getTime())/86400000):null}
function stStatus(st){
  if(!st.active)return'off';
  const d=daysSince(st.lastOrdered);
  if(d===null)return'never';
  if(d>=st.f)return'urg';
  if(d>=st.f*.75)return'soo';
  return'ok';
}
function stCounts(){
  const a=S.staples.filter(s=>s.active);
  return{urg:a.filter(s=>stStatus(s)==='urg').length,
         soo:a.filter(s=>stStatus(s)==='soo').length,
         ok: a.filter(s=>stStatus(s)==='ok').length};
}
function freqLbl(v){const f=FREQS.find(x=>x.v===v);return f?f.l:`כל ${v} ימים`}

// WEEKLY ACTIONS
// ══════════════════════════════════════════
function genWeekly(){
  const toAdd=S.staples.filter(s=>{
    if(!s.active)return false;
    if(s.seasonCat&&!isInSeason(s.seasonCat))return false;
    const st=stStatus(s);
    // 'never' (lastOrdered:null) only qualifies for manually-added items.
    // Analysis items have lastOrdered set to past-due date so they enter via 'urg' instead.
    if(st==='never'&&!s.manual)return false;
    if(st!=='urg'&&st!=='soo'&&st!=='never')return false;
    // Check by sid OR by normalized name (catches apostrophe variants)
    return!S.weekly.find(w=>!w.done&&(w.sid===s.id||normN(w.n)===normN(s.n)));
  });
  S.weekly=[...S.weekly,...toAdd.map((s,i)=>({
    id:'w'+s.id+'_'+Date.now()+'_'+i,sid:s.id,n:s.n,e:s.e,c:s.c,q:s.q,u:s.u,done:false,manual:false
  }))];
  save();
}
function toggleW(wid){
  const w=S.weekly.find(x=>x.id===wid);if(!w)return;
  w.done=!w.done;
  if(w.done&&w.sid){const st=S.staples.find(s=>s.id===w.sid);if(st)st.lastOrdered=new Date().toISOString();}
  save();
}
function removeW(wid){S.weekly=S.weekly.filter(w=>w.id!==wid);save();}
function clearDone(){S.weekly=S.weekly.filter(w=>!w.done);save();}
function addManualW(n,e,c,q,u,oneTime){
  const item={id:'wm'+Date.now(),sid:null,n,e:e||CS[c]?.e||'📦',c:c||'custom',q:q||'1',u:u||'יח׳',done:false,manual:true};
  if(oneTime)item.one_time=true;
  S.weekly.push(item);
  save();
}
function quickAdd(sid){
  const s=S.staples.find(x=>x.id===sid);
  if(!s||S.weekly.find(w=>w.sid===sid&&!w.done))return;
  S.weekly.push({id:'w'+sid+Date.now(),sid:s.id,n:s.n,e:s.e,c:s.c,q:s.q,u:s.u,done:false,manual:false});
  save();
}

function toggleActive(sid){const s=S.staples.find(x=>x.id===sid);if(s){s.active=!s.active;save();}}
function updStaple(sid,upd){const s=S.staples.find(x=>x.id===sid);if(s){Object.assign(s,upd);save();}}
function markOrdered(sid){
  const s=S.staples.find(x=>x.id===sid);if(!s)return;
  s.lastOrdered=new Date().toISOString();
  const w=S.weekly.find(x=>x.sid===sid&&!x.done);if(w)w.done=true;
  save();
}
function addStaple(n,c,e,q,u,f,manual,seasonCat){
  const freq=parseInt(f);
  // Manual items start as 'never ordered' → immediately appear in shopping list.
  // Analysis items get lastOrdered set to one full period ago → status 'urg' → appear via normal scheduling, not via the 'never' backdoor.
  const lastOrdered=manual?null:new Date(Date.now()-freq*86400000).toISOString();
  const obj={id:'sc'+Date.now()+'_'+S.staples.length,n,c,e:e||CS[c]?.e||'📦',q,u,f:freq,lastOrdered,active:true,manual:!!manual};
  if(seasonCat&&seasonCat!=='כל השנה')obj.seasonCat=seasonCat;
  S.staples.push(obj);
  save();
}
function delStaple(sid){S.staples=S.staples.filter(s=>s.id!==sid);S.weekly=S.weekly.filter(w=>w.sid!==sid);save();}

// Normalize name: treat all apostrophe/geresh variants as identical, trim whitespace
function normN(n){return String(n).replace(/[\u05F3\u2018\u2019\u02BC`]/g,"'").trim();}

// Cleanup: remove unwanted items, merge variants, deduplicate, sync weekly
function cleanupStaples(){
  // Fix duplicate staple IDs (caused by same-millisecond addStaple calls)
  const seenIds=new Set();let hadDupIds=false;
  S.staples.forEach((s,i)=>{
    if(seenIds.has(s.id)){
      s.id='sc'+Date.now()+'_'+i+'_fix';hadDupIds=true;
    }
    seenIds.add(s.id);
  });
  // If IDs were duplicated, weekly item sid references may be wrong — clear and regenerate
  if(hadDupIds){S.weekly=S.weekly.filter(w=>w.manual);}

  const REMOVE=['חיתולים','קרמיות לתינוק','דייסת תינוק','מגבונים לח','יוגורט ילדים',
                'שמפו','סבון ידיים','משחת שיניים'];
  const BLACKLIST_PAT=/wolt\+|מנוי|subscription|סיגריות/i;
  // Remove unwanted staples and service-charge items
  S.staples=S.staples.filter(s=>!REMOVE.includes(normN(s.n))&&!BLACKLIST_PAT.test(s.n));
  // Normalize apostrophes in all staple names
  S.staples.forEach(s=>{ s.n=normN(s.n); });
  // Fix category overrides
  S.staples.forEach(s=>{if(s.n==='נייר טואלט')s.c='cleaning';});
  // Fix wrong default quantities from old data
  S.staples.forEach(s=>{if(s.n==='חלב'&&s.q==='4'&&s.u==='קרטון'){s.q='3';s.f=5;}});
  // Merge variant groups: keep lowest f (most frequent), rename to base
  const GROUPS=[
    {base:'גמדים',     pat:/^גמדים[\s\-]/},
    {base:'קולה זירו', pat:/^קולה זירו/},
    {base:'לחמניות',   pat:/לחמניות/},
  ];
  GROUPS.forEach(({base,pat})=>{
    const matches=S.staples.filter(s=>pat.test(s.n)||s.n===base);
    if(matches.length>0){
      matches[0].n=base;
      if(matches.length>1){
        matches[0].f=Math.min(...matches.map(s=>s.f));
        const totalQ=matches.reduce((sum,s)=>sum+(parseFloat(s.q)||1),0);
        matches[0].q=String(Math.round(totalQ));
        const rm=new Set(matches.slice(1).map(s=>s.id));
        S.staples=S.staples.filter(s=>!rm.has(s.id));
      }
    }
  });
  // Relink weekly items whose names match a group pattern → rename + point to base staple
  GROUPS.forEach(({base,pat})=>{
    const baseSt=S.staples.find(s=>s.n===base);
    if(!baseSt) return;
    S.weekly.forEach(w=>{
      if(w.n!==base && pat.test(w.n)){
        w.n=base;
        w.sid=baseSt.id;
        w.q=baseSt.q;
        w.u=baseSt.u||w.u;
        if(baseSt.e) w.e=baseSt.e;
      }
    });
  });
  // Deduplicate staples by NORMALIZED name — keeps first, but merges to lower f
  const seenMap=new Map(); // normN → staple object
  S.staples=S.staples.filter(s=>{
    const k=normN(s.n);
    if(seenMap.has(k)){
      const kept=seenMap.get(k);
      if(s.f<kept.f)kept.f=s.f; // keep most-frequent across duplicates
      return false;
    }
    seenMap.set(k,s);
    return true;
  });
  // Sync weekly: remove items for deleted staples or banned names
  const validSids=new Set(S.staples.map(s=>s.id));
  S.weekly=S.weekly.filter(w=>w.manual||(validSids.has(w.sid)&&!REMOVE.includes(normN(w.n))));
  // Deduplicate weekly by NORMALIZED name+done-state
  const seenW=new Set();
  S.weekly=S.weekly.filter(w=>{
    const k=normN(w.n)+(w.done?'✓':'');
    if(seenW.has(k))return false;
    seenW.add(k);
    return true;
  });
  save();
}

function renderStaples(){
  const cats=['all',...Object.keys(CS).filter(k=>S.staples.some(s=>s.c===k))];
  const filt=S.catFilt==='all'?S.staples:S.staples.filter(s=>s.c===S.catFilt);
  let h=`<button class="btn pri full" style="margin-bottom:8px" data-a="manual-add">+ הוסף פריט ידנית</button>`;
  h+=`<button class="btn sec full" style="margin-bottom:12px" data-a="calibrate">✨ כוונן למשפחה שלי</button>`;
  h+=`<div class="chips">`;
  cats.forEach(c=>{
    const lbl=c==='all'?`הכל (${S.staples.filter(s=>s.active).length})`:`${CS[c]?.e||''} ${CS[c]?.l||c}`;
    h+=`<div class="chip${S.catFilt===c?' on':''}" data-a="fc" data-cat="${c}">${lbl}</div>`;
  });
  h+=`</div>`;
  if(filt.length===0){h+=`<div class="empty"><div class="empty-ico">📭</div><div class="empty-ttl">אין פריטים</div></div>`;return h;}
  // Group by frequency bucket, sorted most-frequent first
  const FREQ_SECS=[
    {max:14, lbl:'📅 שבועי'},
    {max:30, lbl:'🗓️ דו-שבועי'},
    {max:42, lbl:'📆 חודשי'},
    {max:Infinity, lbl:'🗃️ דו-חודשי'},
  ];
  FREQ_SECS.forEach(sec=>{
    const items=filt.filter(s=>(s.f||7)<=sec.max&&(s.f||7)>(FREQ_SECS[FREQ_SECS.indexOf(sec)-1]?.max||0));
    if(!items.length)return;
    h+=`<div class="card"><div class="grp-hdr">${sec.lbl}</div><div>`;
    items.forEach(s=>{
      const st=stStatus(s);const d=daysSince(s.lastOrdered);
      const outOfSeason=s.seasonCat&&!isInSeason(s.seasonCat);
      const meta=outOfSeason
        ?`לא בעונה · ${(CS[s.c]||CS.custom).l}`
        :s.lastOrdered?`הוזמן לפני ${Math.round(d)} ימים · ${(CS[s.c]||CS.custom).l}`:`${(CS[s.c]||CS.custom).l}`;
      const seasonTag=s.seasonCat
        ?`<span style="font-size:11px;padding:1px 6px;border-radius:10px;margin-right:4px;background:${outOfSeason?'var(--div)':'var(--mint)'};color:${outOfSeason?'var(--muted)':'var(--g1)'}">🌱 ${s.seasonCat}</span>`
        :'';
      const ico=s.e
        ?`<div class="cat-ico" style="width:42px;height:42px;background:${(CS[s.c]||CS.custom).bg};font-size:22px">${s.e}</div>`
        :catIco(s.c,42);
      h+=`<div class="item-row${!s.active?' done':''}"${outOfSeason?' style="opacity:0.55"':''}>
        ${ico}
        <div class="i-info"><div class="i-name">${esc(s.n)}${seasonTag}</div>
          <div class="i-meta">${meta}</div>
          ${!outOfSeason&&st!=='ok'&&st!=='off'&&st!=='never'?statusPill(st):''}
        </div>
        <div class="item-right">
          <div class="tog${s.active?' on':''}" data-a="ta" data-sid="${s.id}"></div>
          <button class="item-menu" data-a="es" data-sid="${s.id}">⋮</button>
        </div></div>`;
    });
    h+=`</div></div>`;
  });
  return h;
}

function catOpts(sel='custom'){return Object.entries(CS).map(([k,v])=>`<option value="${k}"${k===sel?' selected':''}>${v.e} ${v.l}</option>`).join('')}
function freqOpts(sel=7){
  // If sel doesn't match a FREQS value exactly, snap to nearest bucket
  const snap=FREQS.find(o=>o.v===sel)?sel:freqBucket(sel||7);
  return FREQS.map(o=>`<option value="${o.v}"${o.v===snap?' selected':''}>${o.l}</option>`).join('');
}

function switchITab(t){
  document.getElementById('itab-upload').classList.toggle('on',t==='upload');

  document.getElementById('ipanel-upload').style.display=t==='upload'?'':'none';
  document.getElementById('ipanel-text').style.display=t==='text'?'':'none';
}

function updFPrev(){
  const fp=document.getElementById('fprev');const ba=document.getElementById('btn-analyze');
  if(!fp)return;
  fp.innerHTML=_files.map((f,i)=>`<span class="fchip">📄 ${esc(f.name.length>18?f.name.slice(0,16)+'...':f.name)}<span class="fchip-x" data-rm="${i}">×</span></span>`).join('');
  if(ba)ba.style.display=_files.length>0?'':'none';
  fp.querySelectorAll('[data-rm]').forEach(x=>x.addEventListener('click',e=>{e.stopPropagation();_files.splice(parseInt(x.dataset.rm),1);updFPrev();}));
}

      <div class="wiz-ttl">ייבוא היסטוריית Wolt</div>
      <div class="wiz-sub">העלה צילומי מסך של הזמנות Wolt אחרונות — AI ינתח מה אתם קונים ויציע מאגר מותאם אישית.</div>

// Robust JSON extractor: counts braces so it handles text before/after the JSON object
function extractJSON(txt){
  // Strip markdown code fences if present
  const fenced=txt.match(/```(?:json)?\s*([\s\S]*?)\s*```/);
  if(fenced)txt=fenced[1];
  const start=txt.indexOf('{');
  if(start===-1)return null;
  let depth=0;
  for(let i=start;i<txt.length;i++){
    if(txt[i]==='{')depth++;
    else if(txt[i]==='}'){depth--;if(depth===0)return txt.slice(start,i+1);}
  }
  return null;
}

// ── Parse a single Wolt JSON export into order events [{date, items:[{name,qty}]}]
function parseWoltOrders(jsonText){
  let data;try{data=JSON.parse(jsonText);}catch{return [];}
  // Support multiple Wolt export shapes
  let raw=null;
  if(Array.isArray(data))raw=data;
  else if(Array.isArray(data.orders))raw=data.orders;
  else if(Array.isArray(data.order_history))raw=data.order_history;
  else if(data.data&&Array.isArray(data.data))raw=data.data;
  else{
    // Last resort: find first array whose items look like orders
    for(const v of Object.values(data)){
      if(Array.isArray(v)&&v.length&&v[0]&&
         (v[0].items||v[0].order_items||v[0].created_at||v[0].date)){raw=v;break;}
    }
  }
  if(!raw)return [];
  const events=[];
  for(const order of raw){
    const dateStr=order.created_at||order.date||order.order_date||order.placed_at||order.time;
    if(!dateStr)continue;
    const date=new Date(dateStr);
    if(isNaN(date.getTime()))continue;
    const rawItems=order.order_items||order.items||order.products||order.cart_items||order.basket||[];
    const items=rawItems.map(i=>({
      name:(i.name||i.product_name||i.title||i.item_name||'').trim(),
      qty:Math.max(1,i.count>0?i.count:parseInt(i.quantity||i.qty||1)||1)
    })).filter(i=>i.name);
    if(items.length)events.push({date,items});
  }
  return events;
}

// ── Median of a numeric array
function median(arr){
  if(!arr.length)return 0;
  const s=[...arr].sort((a,b)=>a-b);
  const m=Math.floor(s.length/2);
  return s.length%2?s[m]:(s[m-1]+s[m])/2;
}

// ── JS pre-calculates per-SKU stats for all SKUs (AI handles semantic grouping)
function preCalcWoltStats(jsonTexts){
  const BLPAT=/wolt\+|מנוי|subscription|סיגריות/i;
  const allEvents=jsonTexts.flatMap(t=>parseWoltOrders(t));
  if(!allEvents.length)throw new Error('לא ניתן לפרסר את קובץ ה-JSON. וודא שזהו ייצוא הזמנות Wolt תקין.');
  // Build SKU map: raw name → {dateKey → total qty}
  const skuMap={};
  for(const ev of allEvents){
    const dk=ev.date.toISOString().slice(0,10);
    for(const it of ev.items){
      if(!skuMap[it.name])skuMap[it.name]={};
      skuMap[it.name][dk]=(skuMap[it.name][dk]||0)+it.qty;
    }
  }
  // Include all SKUs (even ×1); final ≥3 threshold applied in groupSkusByNormKey after combining variants
  const skus=[];
  for(const [name,dq] of Object.entries(skuMap)){
    if(BLPAT.test(name))continue;
    const dates=Object.keys(dq).sort();
    const purchase_count=dates.length;
    // Fix 2: median qty — robust against one-off bulk purchases
    const qtys=dates.map(d=>dq[d]);
    const typical_qty=Math.max(1,Math.round(median(qtys)));
    // Fix 1: median of intervals with outlier trimming — robust against vacation gaps
    let avg_days=0,span_days=0;
    if(purchase_count>1){
      const ts=dates.map(d=>new Date(d).getTime());
      span_days=Math.round((ts[ts.length-1]-ts[0])/86400000);
      const intervals=[];
      for(let i=1;i<ts.length;i++)intervals.push((ts[i]-ts[i-1])/86400000);
      const medInt=median(intervals);
      const clean=intervals.filter(iv=>iv<=medInt*3); // drop gaps > 3× median (vacations, stockouts)
      avg_days=Math.round(median(clean.length?clean:intervals)*10)/10;
    }
    console.log('[precalc]',name,'×'+purchase_count,'avg:'+avg_days+'d','qty:'+typical_qty);
    skus.push({name,purchase_count,span_days,avg_days,typical_qty,dates,qtys});
  }
  return skus;
}

      const KCATS=new Set(['baby','dairy','bread','produce','meat','frozen','snacks','drinks','pantry','cleaning','custom']);
      // byName fallback for old matched_skus format; idx is primary
      const byName={};for(const s of skusForAI)byName[normN(s.name)]=s;

        const matched=it.idx
          ?(it.idx).map(i=>skusForAI[i]).filter(Boolean)
          :(it.matched_skus||[it.name]).map(n=>byName[normN(n)]).filter(Boolean);

        if(count<3){console.log('[merge-drop]',it.name,'merged count:'+count,'<3');return false;}
        // Fix 1: reuse median-interval avg from merged dates
        const ts=allDates.map(d=>new Date(d).getTime());
        const intervals=[];
        for(let i=1;i<ts.length;i++)intervals.push((ts[i]-ts[i-1])/86400000);
        const medInt=median(intervals);
        const clean=intervals.filter(iv=>iv<=medInt*3);
        const avg=Math.round(median(clean.length?clean:intervals)*10)/10;
        if(avg>90){console.log('[merge-drop]',it.name,'avg:'+avg+'d','>90');return false;}
        it.purchase_count=count;
        it.avg_order_interval_days=avg;
        it.span_days=Math.round((ts[ts.length-1]-ts[0])/86400000);
        it.last_purchase=allDates[allDates.length-1];
        // Fix 2: median of all raw qtys across matched SKUs
        const allQtys=matched.flatMap(s=>s.qtys||[]);
        it.typical_qty=Math.max(1,Math.round(median(allQtys.length?allQtys:[1])));
        console.log('[merge-pass]',it.name,'skus:'+matched.length,'count:'+count,'avg:'+avg+'d','qty:'+it.typical_qty);
        return true;
      });
      console.log('[merge] kept',result.items.length,'items');

}

// ══════════════════════════════════════════
// PHASE 2 LEARNING — new item & removal detection
// ══════════════════════════════════════════
// Compute stddev of intervals between sorted date-timestamps (ms array)
function computeStddev(sortedMs){
  if(sortedMs.length<3)return 0; // need ≥2 intervals = ≥3 events
  const intervals=[];
  for(let i=1;i<sortedMs.length;i++)intervals.push((sortedMs[i]-sortedMs[i-1])/86400000);
  const mean=intervals.reduce((a,b)=>a+b,0)/intervals.length;
  const variance=intervals.reduce((a,b)=>a+(b-mean)**2,0)/intervals.length;
  return Math.sqrt(variance);
}
// Returns {ok:bool, flagged:bool}
// ok=true → auto-add; flagged=true → consistent but needs user confirmation; both false → skip
function meetsThreshold(count,avg,stddev){
  if(count<3||avg>90)return{ok:false,flagged:false};
  // Flag (but don't reject) items with high variability — user sees a warning in the modal
  if(stddev>avg*0.5)return{ok:true,flagged:true};
  return{ok:true,flagged:false};
}
// tripItems: [{sid, name, qty}] — items purchased this trip
function checkNewItems(tripItems){
  if(!S.purchaseLog||S.purchaseLog.length<1)return;
  if(!S.pendingSuggestions)S.pendingSuggestions=[];
  const sixMonthsAgo=Date.now()-180*86400000;
  const windowLogs=S.purchaseLog.filter(l=>new Date(l.date).getTime()>=sixMonthsAgo);
  // Only consider items not already in pantry (check by sid when available, else by name)
  const newItems=tripItems.filter(it=>!S.staples.find(s=>(it.sid&&s.id===it.sid)||normN(s.n)===normN(it.name)));
  newItems.forEach(it=>{
    const nn=normN(it.name);
    if(S.pendingSuggestions.find(s=>s.type==='add'&&normN(s.name)===nn))return;
    // Gather logs within window that contain this item (match by name)
    const logsWithItem=windowLogs.filter(log=>log.items.some(i=>normN(i.name)===nn));
    // Same-day merge: group by calendar date, accumulate actual qty
    const byDate={};
    logsWithItem.forEach(log=>{
      const dateKey=new Date(log.date).toISOString().slice(0,10);
      if(!byDate[dateKey])byDate[dateKey]={date:new Date(log.date).getTime(),qty:0};
      const match=log.items.find(i=>normN(i.name)===nn);
      byDate[dateKey].qty+=match?.qty||1;
    });
    const events=Object.values(byDate).sort((a,b)=>a.date-b.date);
    const count=events.length;
    if(count<3)return;
    const dates=events.map(e=>e.date);
    const span=count>1?Math.round((dates[dates.length-1]-dates[0])/86400000):0;
    let avg=7;
    if(count>1){
      const intervals=[];
      for(let i=1;i<dates.length;i++)intervals.push((dates[i]-dates[i-1])/86400000);
      const medInt=median(intervals);
      const clean=intervals.filter(iv=>iv<=medInt*3);
      avg=Math.round(median(clean.length?clean:intervals));
    }
    const avgQty=Math.max(1,Math.round(events.reduce((s,e)=>s+e.qty,0)/count));
    const stddev=computeStddev(dates);
    const thresh=meetsThreshold(count,avg,stddev);
    if(!thresh.ok&&!thresh.flagged)return;
    S.pendingSuggestions.push({type:'add',name:it.name,count,avg,span,avgQty,flagged:thresh.flagged});
  });
}
// Minimum days absent before suggesting removal, per frequency bucket
function minRemovalDays(f){
  if(f<=14)return 21;   // weekly → 3 weeks
  if(f<=30)return 42;   // bi-weekly → 6 weeks
  if(f<=42)return 90;   // monthly → 3 months
  return 180;            // bi-monthly → 6 months
}
function checkRemovals(){
  if(!S.purchaseLog||!S.purchaseLog.length)return;
  if(!S.pendingSuggestions)S.pendingSuggestions=[];
  S.staples.forEach(s=>{
    if(!s.active||s.seasonal||s.seasonCat)return;
    if(s.skipRemovalUntil&&new Date()<new Date(s.skipRemovalUntil))return;
    if(S.pendingSuggestions.find(sug=>sug.type==='remove'&&sug.sid===s.id))return;
    // Time gate: absent at least minRemovalDays for this frequency
    const d=daysSince(s.lastOrdered);
    if(d===null||d<minRemovalDays(s.f))return;
    // Trip gate: within the same window, ≥2 recorded trips where item was absent
    // Protects against false positives during vacations or illness (no trips = no suggestion)
    const windowStart=Date.now()-minRemovalDays(s.f)*86400000;
    const tripsInWindow=S.purchaseLog.filter(trip=>new Date(trip.date).getTime()>=windowStart);
    const absentTrips=tripsInWindow.filter(trip=>!trip.items.some(item=>(item.sid&&item.sid===s.id)||normN(item.name)===normN(s.n)));
    if(absentTrips.length<2)return;
    S.pendingSuggestions.push({type:'remove',sid:s.id,name:s.n,days:Math.round(d),freq:s.f});
  });
}
function showNextSuggestion(){
  if(!S.pendingSuggestions||!S.pendingSuggestions.length)return;
  // Skip snoozed suggestions — find first one that's ready
  const now=Date.now();
  const idx=S.pendingSuggestions.findIndex(s=>!s.showAfter||s.showAfter<=now);
  if(idx===-1)return; // all snoozed
  if(idx>0){const[s]=S.pendingSuggestions.splice(idx,1);S.pendingSuggestions.unshift(s);save();}
  const sug=S.pendingSuggestions[0];
  if(sug.type==='add'){
    const bucket=freqBucket(sug.avg);
    const bucketLbl=FREQS.find(f=>f.v===bucket)?.l||freqLbl(bucket);
    const sugFreqOpts=FREQS.map(f=>`<option value="${f.v}"${f.v===bucket?' selected':''}>${esc(f.l)}</option>`).join('');
    const qtyHint=sug.avgQty&&sug.avgQty>1?` · כמות ממוצעת: ${sug.avgQty} יח׳`:'';
    const flagNote=sug.flagged?`<div style="background:var(--oras);color:var(--ora);border-radius:var(--r2);padding:10px 14px;font-size:13px;margin-bottom:12px">⚠️ הרכישות לא קבועות — בדוק לפני הוספה</div>`:'';
    openModal('להוסיף לרשימה הקבועה?',`
      ${flagNote}

      <p style="text-align:center;line-height:1.6;margin-bottom:4px">נקנה <strong>${esc(sug.name)}</strong> ${sug.count} פעמים,<br>ממוצע כל ${sug.avg} ימים${qtyHint}</p>
      <p style="text-align:center;font-size:14px;color:var(--g1);font-weight:700;margin-bottom:16px">להוסיף לרשימה הקבועה כ${bucketLbl}?</p>
      <div class="fg"><label class="fl">קטגוריה</label>
        <select class="fsel" id="sug-cat">${catOpts('custom')}</select></div>

        <select class="fi" id="sug-freq">${sugFreqOpts}</select></div>
      <button class="btn pri full" onclick="acceptAddSug()">כן, הוסף ✓</button>
      <button class="btn ghost full" style="margin-top:6px" onclick="snoozeSug()">לא עכשיו (תזכיר עוד 30 יום)</button>
      <button class="btn ghost full" style="margin-top:6px" onclick="dismissSug()">לא, תודה (לעולם לא)</button>`);
  } else if(sug.type==='remove'){
    const cyclesMissed=Math.floor(sug.days/sug.freq);
    // Human-readable time unit for removal message
    let timeDesc;
    if(sug.freq<=14)timeDesc=`${Math.round(sug.days/7)} שבועות`;
    else if(sug.freq<=30)timeDesc=`${Math.round(sug.days/7)} שבועות`;
    else timeDesc=`${Math.round(sug.days/30)} חודשים`;
    openModal('להסיר מהרשימה?',`
      <div style="text-align:center;font-size:32px;margin-bottom:8px">❓</div>
      <p style="text-align:center;line-height:1.6;margin-bottom:20px">לא קנית <strong>${esc(sug.name)}</strong> כבר ${timeDesc}<br><span style="color:var(--muted)">(${cyclesMissed} מחזורים שפוספסו)</span></p>
      <button class="btn dan full" onclick="acceptRemoveSug()">כן, הסר</button>
      <button class="btn ghost full" style="margin-top:6px" onclick="keepSug()">לא, השאר (שאל שוב אחרי 3 מחזורים)</button>
      <div style="margin-top:6px;display:flex;gap:6px">
        <button class="btn ghost" style="flex:1" onclick="markSeasonal()">🌱 עונתי</button>
        <select class="fsel" id="sug-season" style="flex:1">${['קיץ','סתיו','חורף','אביב'].map(v=>`<option value="${v}">${v}</option>`).join('')}</select>
      </div>`);
  }
}
function acceptAddSug(){
  const sug=S.pendingSuggestions?.[0];if(!sug||sug.type!=='add')return;
  const sel=document.getElementById('sug-freq');
  const bucket=sel?parseInt(sel.value):freqBucket(sug.avg);
  const cat=document.getElementById('sug-cat')?.value||'custom';
  const qty=String(sug.avgQty||1);
  addStaple(sug.name,cat,CS[cat]?.e,qty,'יח׳',bucket,true);
  S.pendingSuggestions.shift();save();closeModal();render();
  toast(`${esc(sug.name)} נוסף לרשימה ${freqLbl(bucket)} ✓`,'pri');
  setTimeout(showNextSuggestion,350);
}
function dismissSug(){
  if(S.pendingSuggestions)S.pendingSuggestions.shift();
  save();closeModal();setTimeout(showNextSuggestion,350);
}
function snoozeSug(){
  const sug=S.pendingSuggestions?.[0];if(!sug||sug.type!=='add')return;
  sug.showAfter=Date.now()+30*86400000;
  S.pendingSuggestions.shift();
  S.pendingSuggestions.push(sug);
  save();closeModal();
  toast(`${esc(sug.name)} — נזכיר עוד 30 יום`,'wrn');
  setTimeout(showNextSuggestion,350);
}
function acceptRemoveSug(){
  const sug=S.pendingSuggestions?.[0];if(!sug||sug.type!=='remove')return;
  S.staples=S.staples.filter(s=>s.id!==sug.sid);
  S.weekly=S.weekly.filter(w=>w.sid!==sug.sid);
  S.pendingSuggestions.shift();save();closeModal();render();
  toast(`${esc(sug.name)} הוסר מהמאגר`,'pri');
  setTimeout(showNextSuggestion,350);
}
function keepSug(){
  const sug=S.pendingSuggestions?.[0];if(!sug||sug.type!=='remove')return;
  const st=S.staples.find(s=>s.id===sug.sid);
  if(st){
    // Ask again after 3 more cycles (3 × the item's frequency in days)
    st.skipRemovalUntil=new Date(Date.now()+st.f*3*86400000).toISOString();
  }
  S.pendingSuggestions.shift();save();closeModal();
  toast(`${esc(sug.name)} נשאר — נשאל שוב מאוחר יותר`,'wrn');
  setTimeout(showNextSuggestion,350);
}
function markSeasonal(){
  const sug=S.pendingSuggestions?.[0];if(!sug||sug.type!=='remove')return;
  const st=S.staples.find(s=>s.id===sug.sid);
  if(st){
    const sel=document.getElementById('sug-season');
    st.seasonCat=sel?sel.value:'קיץ';
    delete st.seasonal; // remove old boolean field
  }
  S.pendingSuggestions.shift();save();closeModal();render();
  toast(`${esc(sug.name)} סומן כעונתי (${st?.seasonCat||''}) 🌱`,'pri');
  setTimeout(showNextSuggestion,350);
}

// ══════════════════════════════════════════
// CALIBRATE FREQUENCIES (AI-powered)
// ══════════════════════════════════════════
async function calibrateFrequencies(){
  if(!S.settings.apiKey){requireApiKey(calibrateFrequencies);return;}
  openModal('✨ מכייל...',
    `<div class="loading"><div class="spinner"></div>
    <p>שולח ל-AI לכיוול תדירויות וכמויות<br>למשפחה של 5...</p></div>`);
  try{
    const items=S.staples.map(s=>({id:s.id,name:s.n,cat:s.c,qty:s.q,unit:s.u,freq_days:s.f}));
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'x-api-key':S.settings.apiKey,'anthropic-version':'2023-06-01',
        'content-type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:S.settings.model||'claude-opus-4-6',max_tokens:4096,
        messages:[{role:'user',content:`You are calibrating a grocery pantry for an Israeli family of 5: 2 adults, kids ages 7, 5, and 1.5.

Current pantry:
${JSON.stringify(items,null,2)}

For each item, decide if the current freq_days and qty per purchase are realistic.
ONLY return items where you suggest changes. Skip items that look correct.

freq_days reference: 7=שבועי(weekly), 21=דו-שבועי(biweekly), 35=חודשי(monthly), 60=דו-חודשי(bimonthly). Min is 7.

Typical consumption for this family:
- Milk (1L cartons): ~4-5L/week → buy 3 cartons every 5 days, or 4-5 weekly
- Eggs: ~15/week → 1 tray (12) every 5-7 days
- Bread: goes fast, every 3-5 days
- Vegetables/fruit: every 3-5 days
- Pasta/rice: lasts 3-4 weeks
- Cleaning items: monthly or longer
- Pantry staples: monthly

Be conservative — only flag items that are clearly wrong (e.g. qty way off, or frequency implausible for this family size).

Return JSON only:
{"suggestions":[{"id":"s6","name":"חלב","f":5,"q":"3","u":"קרטון","reason":"Family needs ~4L/week, 3 cartons every 5 days"}],"summary":"One line summary of main changes"}`}]})});
    if(resp.status===401){S.settings.apiKey='';save();updateKeyBadge();throw new Error('__auth__');}
    if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||`Error ${resp.status}`);}
    const data=await resp.json();
    const txt=data.content[0]?.text||'';
    const jsonStr=extractJSON(txt);
    if(!jsonStr)throw new Error('No suggestions returned.');
    const result=JSON.parse(jsonStr);
    const sugs=(result.suggestions||[]).filter(s=>S.staples.find(x=>x.id===s.id));
    if(!sugs.length){closeModal();toast('כל התדירויות נראות טוב ✓','pri');return;}
    const sugsH=sugs.map(s=>{
      const old=S.staples.find(x=>x.id===s.id);if(!old)return'';
      const fCh=s.f&&s.f!==old.f;const qCh=s.q&&s.q!==old.q;
      if(!fCh&&!qCh)return'';
      return`<div class="post-item sel" data-cal-id="${esc(s.id)}" onclick="this.classList.toggle('sel');this.querySelector('.chk').classList.toggle('on')">
        ${wIco(old,40)}
        <div class="i-info">
          <div class="i-name">${esc(s.name||old.n)}</div>
          <div class="i-meta">${fCh?`<span style="color:var(--muted)">${freqLbl(old.f)}</span> → <strong>${freqLbl(s.f)}</strong>`:''}${fCh&&qCh?' &nbsp;·&nbsp; ':''}${qCh?`<span style="color:var(--muted)">${esc(old.q)} ${esc(old.u)}</span> → <strong>${esc(s.q)} ${esc(s.u||old.u)}</strong>`:''}</div>
          ${s.reason?`<div class="i-meta" style="color:var(--txt2);font-style:italic">${esc(s.reason)}</div>`:''}
        </div>
        <div class="chk on" style="pointer-events:none">✓</div>
      </div>`;
    }).join('');
    closeModal();
    openModal('✨ כיוול תדירויות',`
      ${result.summary?`<div style="background:var(--mint);border-radius:var(--r2);padding:12px;margin-bottom:14px;font-size:13px;color:var(--txt2)">💡 ${esc(result.summary)}</div>`:''}
      <div style="font-size:13px;color:var(--muted);margin-bottom:10px">בחר שינויים להחלה:</div>
      <div class="card" style="margin-bottom:14px" id="cal-list">${sugsH}</div>
      <div style="display:flex;gap:9px">
        <button class="btn out" style="flex:1" onclick="closeModal()">ביטול</button>
        <button class="btn pri" style="flex:1" id="cal-apply">החל נבחרים ✓</button>
      </div>`);
    document.getElementById('cal-apply').onclick=()=>{
      const sel=Array.from(document.querySelectorAll('[data-cal-id].sel')).map(el=>el.dataset.calId);
      let changed=0;
      sugs.filter(s=>sel.includes(s.id)).forEach(s=>{
        const st=S.staples.find(x=>x.id===s.id);
        if(!st)return;
        if(s.f)st.f=s.f;
        if(s.q)st.q=s.q;
        if(s.u)st.u=s.u;
        changed++;
      });
      save();closeModal();render();
      toast(`${changed} פריטים עודכנו ✓`,'pri');
    };
  }catch(e){
    closeModal();
    if(e.message==='__auth__'){requireApiKey(calibrateFrequencies);return;}
    toast('שגיאה: '+(e.message||'בדוק את מפתח ה-API'),'dan');console.error(e);
  }
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
let _tt;
function toast(msg,type='pri'){
  document.querySelector('.toast')?.remove();clearTimeout(_tt);
  const t=document.createElement('div');t.className=`toast ${type}`;
  const ico={pri:'✓',dan:'✕',wrn:'⚠️'};
  t.innerHTML=`<span>${ico[type]||''}</span> ${esc(msg)}`;
  document.body.appendChild(t);
  _tt=setTimeout(()=>{t.classList.add('hide');setTimeout(()=>t.remove(),200);},2800);
}

function setup(){
  document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>setTab(b.dataset.tab)));
  document.getElementById('btn-settings').addEventListener('click',openSettings);
  document.getElementById('btn-import').addEventListener('click',openImport);
  document.getElementById('fab').addEventListener('click',()=>{
    if(S.tab==='staples')openAddPantryItem();
    else openAddItem();
  });
  document.getElementById('main').addEventListener('click',e=>{
    const el=e.target.closest('[data-a]');if(!el)return;
    const a=el.dataset.a;
    if(a==='tw'){toggleW(el.dataset.wid);render();const w=S.weekly.find(x=>x.id===el.dataset.wid);if(w?.done)toast(`${w.n} הוזמן ✓`,'pri');}
    if(a==='rw'){removeW(el.dataset.wid);render();}
    if(a==='cd'){clearDone();render();toast('נוקתה ✓','wrn');}
    if(a==='gw'){genWeekly();render();toast('הרשימה עודכנה ✨','pri');}
    if(a==='go-shop')setTab('shop');
    if(a==='qadd'){quickAdd(el.dataset.sid);render();const s=S.staples.find(x=>x.id===el.dataset.sid);if(s)toast(`${s.n} נוסף ✓`,'pri');}
    if(a==='fc'){S.catFilt=el.dataset.cat;render();}
    if(a==='ta'){toggleActive(el.dataset.sid);render();}
    if(a==='es'){openEditStaple(el.dataset.sid);}
    if(a==='mo'){markOrdered(el.dataset.sid);render();toast('עודכן ✓','pri');}
    if(a==='calibrate'){calibrateFrequencies();}
    if(a==='manual-add'){openAddPantryItem();}
    if(a==='open-import')openImport();
    if(a==='ra'){if(_files.length===0){toast('נא לבחור קבצים','dan');return;}analyzeFiles(_files);}
    if(a==='post-shop')openPostShopping();
  });
}

// ══════════════════════════════════════════
// PWA
// ══════════════════════════════════════════
function setupPWA(){
  try{
    const c=document.createElement('canvas');c.width=180;c.height=180;
    const ctx=c.getContext('2d');ctx.fillStyle='#1A7C4A';
    if(ctx.roundRect)ctx.roundRect(0,0,180,180,36);else ctx.rect(0,0,180,180);
    ctx.fill();ctx.font='100px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🛒',90,94);
    let lnk=document.querySelector("link[rel='apple-touch-icon']");
    if(!lnk){lnk=document.createElement('link');lnk.rel='apple-touch-icon';document.head.appendChild(lnk);}
    lnk.href=c.toDataURL('image/png');
  }catch(e){}
  if('serviceWorker' in navigator){
    const sw=`const C='hs-v83';const A=['.'];
self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(A)).then(()=>self.skipWaiting())));
self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim())));
self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('.'))));});`;
    const blob=URL.createObjectURL(new Blob([sw],{type:'text/javascript'}));
    // Unregister stale SWs before registering new one — ensures fresh code after deployments
    navigator.serviceWorker.getRegistrations()
      .then(regs=>Promise.all(regs.map(r=>r.unregister())))
      .then(()=>navigator.serviceWorker.register(blob))
      .catch(()=>navigator.serviceWorker.register(blob).catch(()=>{}));
  }
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  setupPWA();load();if(S.tab==='home')S.tab='shop';
  // Force clear all pantry + shopping data once for v35 — ensures no stale localStorage
  // data survives across algorithm changes. clearedV is bumped each time a full wipe is needed.
  if((S.clearedV||0)<35){
    S.staples=[];S.weekly=[];S.clearedV=35;save();
  }
  cleanupStaples();
  if(!S.staples.length&&!S.setupDone)S.staples=DEFAULT_STAPLES.map(d=>({...d,lastOrdered:null,active:true}));
  if(!S.purchaseLog)S.purchaseLog=[];
  // Migrate old purchaseLog format: items was string[], now [{sid,name,qty}]
  S.purchaseLog=S.purchaseLog.map(log=>{
    if(log.items&&log.items.length&&typeof log.items[0]==='string'){
      log.items=log.items.map(name=>{
        const st=S.staples.find(s=>normN(s.n)===normN(name));
        return {sid:st?.id||null,name,qty:1};
      });
    }
    return log;
  });
  if(!S.pendingSuggestions)S.pendingSuggestions=[];
  genWeekly();render();setup();updateKeyBadge();
  if(!S.setupDone)setTimeout(openWizard,350);
});
